name: Build NitroWin

on: push

jobs:
  build-windows-x64:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build and publish
        run: dotnet publish --configuration Release --runtime win-x64

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: NitroWin-x64
          path: "src/NitroWin/bin/Release/net10.0-windows/win-x64/publish/NitroWin.exe"

  build-windows-arm64:
    runs-on: windows-11-arm

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build and publish
        run: dotnet publish --configuration Release --runtime win-arm64

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: NitroWin-arm64
          path: "src/NitroWin/bin/Release/net10.0-windows/win-arm64/publish/NitroWin.exe"
